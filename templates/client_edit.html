{{define "content"}}
{{$c := .Data}}

<div class="page-header">
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="/clients" class="btn btn-secondary btn-sm">← Retour</a>
    <h2 class="page-title">Modifier le client</h2>
  </div>
</div>

<div class="page-body">

  {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

  <div class="card" style="max-width:600px;">
    <div class="card-body">
      <form method="POST" action="/clients/edit?id={{$c.ID}}">
        <div class="form-row">
          <div class="form-group">
            <label>Nom *</label>
            <input type="text" name="nom" value="{{$c.Nom}}" required autofocus>
          </div>
          <div class="form-group">
            <label>Prénom *</label>
            <input type="text" name="prenom" value="{{$c.Prenom}}" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" name="telephone" value="{{$c.Telephone}}" placeholder="0555 123 456">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{$c.Email}}">
          </div>
        </div>
        <div class="form-group">
          <label>Adresse</label>
          <textarea name="adresse" rows="2">{{$c.Adresse}}</textarea>
        </div>
        <div style="display:flex;gap:10px;">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <a href="/clients" class="btn btn-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>

</div>
{{end}}
